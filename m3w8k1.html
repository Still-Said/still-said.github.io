                border-radius: 50%;

            }

            .staticrypt-page {
                width: 100%;
                max-width: 380px;
                padding: 0 1.5rem;
                text-align: center;
            }
            .staticrypt-form {
                background: #FFFFFF;
                border: 1px solid #ece8e2;
                border-radius: 8px;
                padding: clamp(2rem, 8vw, 3rem) clamp(1.5rem, 6vw, 2.5rem);
            }
            .staticrypt-brand {
                font-family: 'Inter', sans-serif;
                font-size: 0.6rem;
                font-weight: 300;
                letter-spacing: 0.2em;
                text-transform: uppercase;
                color: #b8b0a6;
                margin-bottom: 1.5rem;
            }
            .staticrypt-title {
                font-family: 'Cormorant Garamond', Georgia, serif;
                font-size: clamp(1.6rem, 5vw, 2rem);
                font-weight: 300;
                font-style: italic;
                color: #3a3530;
                line-height: 1.3;
                margin: 0 0 0.5rem;
            }
            .staticrypt-instructions p {
                font-size: 0.78rem;
                font-weight: 300;
                color: #8a8078;
                line-height: 1.6;
                margin: 0;
            }
            .staticrypt-hr {
                border: none;
                border-top: 1px solid #ece8e2;
                margin: 1.5rem 0;
            }
            .staticrypt-password-container {
                position: relative;
                background: #f7f5f2;
                border: 1px solid #e0dcd6;
                border-radius: 4px;
                margin-bottom: 1rem;
                transition: border-color 0.2s;
            }
            .staticrypt-password-container:focus-within {
                border-color: #a09890;
            }
            .staticrypt-form input[type="password"],
            .staticrypt-form input[type="text"] {
                background: transparent;
                border: none;
                font-family: 'Inter', sans-serif;
                font-size: 16px;
                font-weight: 300;
                color: #3a3530;
                padding: 0.8rem 2.5rem 0.8rem 1rem;
                width: 100%;
                box-sizing: border-box;
                outline: none;
            }
            .staticrypt-form input[type="password"]::placeholder,
            .staticrypt-form input[type="text"]::placeholder {
                color: #b8b0a6;
            }
            .staticrypt-toggle-password-visibility {
                cursor: pointer;
                width: 18px; height: 18px;
                opacity: 0.4;
                position: absolute;
                right: 0.8rem;
                top: 50%;
                transform: translateY(-50%);
                padding: 0;
            }
            .staticrypt-decrypt-button {
                font-family: 'Inter', sans-serif;
                font-size: 0.72rem;
                font-weight: 400;
                letter-spacing: 0.12em;
                text-transform: uppercase;
                color: #FFFFFF;
                background: #3a3530;
                border: none;
                border-radius: 4px;
                padding: 0.8rem 2rem;
                width: 100%;
                cursor: pointer;
                transition: background 0.2s;

            .staticrypt-decrypt-button:hover {
                background: #524d46;

            .staticrypt-remember {

                justify-content: center;

                margin-bottom: 1rem;
                font-size: 0.7rem;
                font-weight: 300;
                color: #8a8078;
                cursor: pointer;
            }

                accent-color: #3a3530;
            }
